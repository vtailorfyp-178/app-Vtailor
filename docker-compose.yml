services:
  web:
    build: .
    ports:
      - "8000:8000"
    # Must mount project into the same WORKDIR used in Dockerfile
    volumes:
      - ./:/docker_app
    environment:
      - ENV=development
      - MONGODB_URL=mongodb://db:27017
      - MONGODB_DB_NAME=vtailor_db
      - PYTHONPATH=/docker_app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password

volumes:
  mongo_data:
